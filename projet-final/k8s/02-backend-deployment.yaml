apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend-deployment
  namespace: projet-final
  labels:
    app: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
      - name: backend
        # Remplacez local par votre identifiant Docker Hub
        image: local/projet-final-backend:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 5000
        # Ressources (CPU / Mémoire) obligatoires pour la stabilité
        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
          limits:
            cpu: "250m"
            memory: "256Mi"
        # Sondes pour vérifier l'état du conteneur (basées sur /api/health)
        livenessProbe:
          httpGet:
            path: /api/health
            port: 5000
          initialDelaySeconds: 5
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /api/health
            port: 5000
          initialDelaySeconds: 2
          periodSeconds: 5
